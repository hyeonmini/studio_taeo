<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>WeSpend</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3efe8;          /* warm cream */
    --ink:#1c1a17;         /* near-black, warm */
    --muted:#6b6358;       /* warm grey */
    --line:#e2dace;
    --accent:#c8924e;      /* warm caramel (ties to WeSpend amber) */
    --glow:#ffd9a8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Pretendard',sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    min-height:100svh; display:flex; flex-direction:column;
    position:relative; overflow-x:hidden;
  }
  /* soft warm glow */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:radial-gradient(60% 45% at 50% -5%, var(--glow) 0%, transparent 60%);
    opacity:.55;
  }
  header,main,footer{position:relative; z-index:1}
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px clamp(20px,5vw,48px);
  }
  .word{font-family:'Instrument Serif',serif; font-size:24px; letter-spacing:.2px}
  .word b{font-weight:400}
  header a{color:var(--muted); text-decoration:none; font-size:14px; font-weight:500}
  header a:hover{color:var(--ink)}

  main{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:6vh clamp(20px,6vw,40px) 8vh; gap:30px;
  }
  .icon{
    width:84px; height:84px; border-radius:21px; box-shadow:0 14px 40px rgba(120,80,20,.20);
    animation:rise .9s cubic-bezier(.2,.7,.2,1) both;
  }
  h1{
    font-family:'Instrument Serif',serif; font-weight:400;
    font-size:clamp(2.7rem,7.4vw,5.4rem); line-height:1.04; letter-spacing:-.5px;
    max-width:16ch; animation:rise 1s cubic-bezier(.2,.7,.2,1) .06s both;
  }
  h1 em{font-style:italic; color:var(--accent)}
  .sub{
    font-size:clamp(1.02rem,2.4vw,1.22rem); line-height:1.6; color:var(--muted);
    max-width:30ch; font-weight:400; animation:rise 1s cubic-bezier(.2,.7,.2,1) .14s both;
  }
  .dl{display:flex; flex-direction:column; align-items:center; gap:12px;
      animation:rise 1s cubic-bezier(.2,.7,.2,1) .22s both}
  .badge{display:inline-block; transition:transform .25s, filter .25s}
  .badge:hover{transform:translateY(-2px); filter:brightness(1.04)}
  .badge img{height:52px; display:block}
  .hint{font-size:13.5px; color:var(--muted); letter-spacing:.1px; min-height:18px}
  .qr{display:none; flex-direction:column; align-items:center; gap:10px; margin-top:8px;
      background:#fffdf8; border:1px solid var(--line); border-radius:18px; padding:18px 18px 14px;
      box-shadow:0 10px 30px rgba(120,80,20,.10)}
  .qr img{width:148px; height:148px; display:block}
  .qrcap{font-size:13px; color:var(--muted)}

  footer{
    text-align:center; padding:26px 20px 34px; color:var(--muted);
    font-size:13px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap;
  }
  footer a{color:var(--muted); text-decoration:none}
  footer a:hover{color:var(--ink); text-decoration:underline}
  .dot{opacity:.4}

  @keyframes rise{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
  <header>
    <span class="word"><b>WeSpend</b></span>
    <a id="navStore" href="https://apps.apple.com/app/id6760176874" target="_blank" rel="noopener">App Store ↗</a>
  </header>

  <main>
    <img class="icon" src="assets/icon-512.png" alt="WeSpend">
    <h1 id="h1">부자의 첫걸음은<br><em>스크린샷 한 장.</em></h1>
    <p class="sub" id="sub">기록이 귀찮아 못 모았던 거예요. 사진 한 장이면 정리는 끝 — 이제 혼자 보지 않아도 돼요.</p>
    <div class="dl">
      <a class="badge" id="badge" href="https://apps.apple.com/app/id6760176874" target="_blank" rel="noopener">
        <img id="badgeImg" src="assets/appstore-ko-black.svg" alt="App Store에서 다운로드">
      </a>
      <span class="hint" id="hint"></span>
      <div class="qr" id="qr">
        <img src="assets/qr-appstore.svg" alt="App Store QR" width="148" height="148">
        <span class="qrcap" id="qrcap"></span>
      </div>
    </div>
  </main>

  <footer>
    <span>© 2026 Studio Taeo</span>
    <span class="dot">·</span>
    <a href="https://wespend.studiotaeo.com/privacy" target="_blank" rel="noopener">개인정보 처리방침</a>
  </footer>

<script>
(function(){
  // ----- minimal i18n (auto-detect, fallback en). Low-maintenance: tagline only. -----
  var T = {
    ko:{h:'부자의 첫걸음은<br><em>스크린샷 한 장.</em>', s:'기록이 귀찮아 못 모았던 거예요. 사진 한 장이면 정리는 끝 — 이제 혼자 보지 않아도 돼요.', badge:'ko'},
    en:{h:'Your first step to wealth<br><em>is a single screenshot.</em>', s:'You never saved because tracking was a chore. One photo and it’s sorted — and now you’re not looking alone.', badge:'en'},
    ja:{h:'豊かさの第一歩は<br><em>スクショ一枚から。</em>', s:'記録が面倒で続かなかっただけ。写真一枚で整理は完了 — もう、ひとりで見なくていい。', badge:'en'},
    'zh-Hans':{h:'富有的第一步<br><em>是一张截图。</em>', s:'只是记账太麻烦才没坚持。一张照片就整理好 — 现在，不用一个人盯着了。', badge:'en'},
    es:{h:'El primer paso hacia la riqueza<br><em>es una captura.</em>', s:'No ahorrabas porque anotar cansaba. Una foto y queda ordenado — y ya no miras solo.', badge:'en'}
  };
  var lang = (navigator.language||'en').toLowerCase();
  var key = lang.indexOf('zh')===0 ? 'zh-Hans'
          : (T[lang] ? lang : (T[lang.split('-')[0]] ? lang.split('-')[0] : 'en'));
  var t = T[key] || T.en;
  document.documentElement.lang = key;
  document.getElementById('h1').innerHTML = t.h;
  document.getElementById('sub').textContent = t.s;
  document.getElementById('badgeImg').src = 'assets/appstore-'+t.badge+'-black.svg';

  // ----- OS auto-detect → adapt the download hint -----
  var ua = navigator.userAgent;
  var isIPad = /iPad/.test(ua) || (navigator.platform==='MacIntel' && (navigator.maxTouchPoints||0) > 1);
  var isIPhone = /iPhone|iPod/.test(ua);
  var isMac = /Macintosh/.test(ua) && (navigator.maxTouchPoints||0) <= 1;
  var isAndroid = /Android/.test(ua);
  var H = {
    ko:{apple:'iPhone과 iPad에서 만나요', mac:'Mac App Store에서도 받을 수 있어요', other:'iPhone · iPad 앱이에요. 폰에서 열어 받아주세요'},
    en:{apple:'For iPhone & iPad', mac:'Also on the Mac App Store', other:'An iPhone & iPad app — open this on your phone'},
    ja:{apple:'iPhoneとiPadで', mac:'Mac App Storeでも', other:'iPhone・iPad向けアプリです。スマホで開いてください'},
    'zh-Hans':{apple:'适用于 iPhone 和 iPad', mac:'Mac App Store 也可下载', other:'这是 iPhone·iPad 应用，请在手机上打开'},
    es:{apple:'Para iPhone y iPad', mac:'También en Mac App Store', other:'App para iPhone y iPad — ábrela en tu teléfono'}
  };
  var QRCAP = {
    ko:'iPhone 카메라로 스캔하세요', en:'Scan with your iPhone camera',
    ja:'iPhoneのカメラでスキャン', 'zh-Hans':'用 iPhone 相机扫描',
    es:'Escanéalo con la cámara de tu iPhone'
  };
  var h = H[key] || H.en;
  var hint = document.getElementById('hint');
  if(isIPhone || isIPad){ hint.textContent = h.apple; }
  else if(isMac){ hint.textContent = h.mac; }
  else {
    hint.textContent = h.other;
    document.getElementById('qr').style.display = 'flex';
    document.getElementById('qrcap').textContent = QRCAP[key] || QRCAP.en;
  }
})();
</script>
</body>
</html>
